<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoFlux — 基站数据地理化匹配工具</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0F172A;
    --surface: #1E293B;
    --surface-hover: #273248;
    --text: #F8FAFC;
    --text-secondary: #94A3B8;
    --text-muted: #64748B;
    --border: #334155;
    --accent: #22C55E;
    --accent-hover: #16A34A;
    --accent-glow: rgba(34,197,94,.15);
    --red: #EF4444;
    --radius: 12px;
    --radius-sm: 8px;
    --font-body: "IBM Plex Sans", -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
    --font-mono: "JetBrains Mono", "SF Mono", "Fira Code", monospace;
  }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .container { max-width: 720px; margin: 0 auto; padding: 64px 24px 80px; }

  /* Header */
  .header { text-align: center; margin-bottom: 56px; }
  .header-icon { width: 64px; height: 64px; margin: 0 auto 20px; background: var(--accent); border-radius: 18px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 32px var(--accent-glow); }
  .header-icon svg { width: 32px; height: 32px; color: #0F172A; }
  .header h1 { font-size: 28px; font-weight: 700; letter-spacing: -.02em; margin-bottom: 6px; }
  .header .sub { font-size: 15px; color: var(--text-secondary); }

  /* Download Card */
  .download-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    margin-bottom: 20px;
    text-align: center;
  }
  .download-card .version {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    background: var(--accent-glow);
    display: inline-block;
    padding: 4px 12px;
    border-radius: 999px;
    margin-bottom: 16px;
  }
  .download-card .filename {
    font-family: var(--font-mono);
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 6px;
    word-break: break-all;
  }
  .download-card .meta {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 24px;
  }
  .download-card .meta span + span { margin-left: 12px; }
  .btn-download {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--font-body); font-size: 16px; font-weight: 600;
    padding: 14px 36px; border-radius: 999px;
    background: var(--accent); color: #0F172A;
    text-decoration: none; border: none; cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    box-shadow: 0 0 40px var(--accent-glow);
  }
  .btn-download:hover { transform: translateY(-1px); box-shadow: 0 0 56px rgba(34,197,94,.25); }
  .btn-download:active { transform: scale(.98); }
  .btn-download:focus-visible { outline: 3px solid var(--accent); outline-offset: 3px; }
  .btn-download svg { width: 20px; height: 20px; }

  /* SHA256 */
  .sha-row {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-top: 18px; flex-wrap: wrap;
  }
  .sha-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); }
  .sha-value {
    font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary);
    background: var(--bg); padding: 6px 12px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); max-width: 340px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; user-select: all;
  }
  .btn-copy {
    font-family: var(--font-body); font-size: 12px; font-weight: 500;
    padding: 6px 14px; border-radius: 999px;
    background: transparent; color: var(--text-secondary);
    border: 1px solid var(--border); cursor: pointer;
    transition: .15s;
  }
  .btn-copy:hover { background: var(--surface-hover); color: var(--text); }
  .btn-copy.copied { color: var(--accent); border-color: var(--accent); }

  /* Features */
  .features { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 40px; }
  .feature {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 18px 16px;
    display: flex; gap: 12px; align-items: flex-start;
  }
  .feature-icon {
    width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(34,197,94,.1); color: var(--accent);
  }
  .feature-icon svg { width: 18px; height: 18px; }
  .feature h3 { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .feature p { font-size: 12px; color: var(--text-secondary); line-height: 1.55; }

  /* History */
  .history { margin-bottom: 40px; }
  .history-header {
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; padding: 14px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0;
  }
  .history-header h2 { font-size: 15px; font-weight: 600; }
  .history-header .chevron { transition: transform .2s; color: var(--text-muted); }
  .history-header.open .chevron { transform: rotate(180deg); }
  .history-list { display: none; }
  .history-list.open { display: block; }
  .history-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 0; border-bottom: 1px solid var(--border);
    gap: 12px; flex-wrap: wrap;
  }
  .history-item .ver {
    font-family: var(--font-mono); font-size: 13px; font-weight: 500;
    color: var(--text);
  }
  .history-item .info { font-size: 12px; color: var(--text-muted); }
  .history-item .btn-sm {
    font-family: var(--font-body); font-size: 12px; font-weight: 500;
    padding: 6px 16px; border-radius: 999px;
    background: transparent; color: var(--text-secondary);
    border: 1px solid var(--border); text-decoration: none;
    transition: .15s; white-space: nowrap;
  }
  .history-item .btn-sm:hover { background: var(--surface-hover); color: var(--text); }

  /* Skeleton */
  .skeleton {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 32px; text-align: center;
    animation: pulse 1.8s ease-in-out infinite;
    margin-bottom: 20px;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .5; }
  }
  .skeleton-line {
    height: 16px; background: var(--border); border-radius: 4px;
    margin: 8px auto;
  }

  /* Error */
  .error-card {
    background: var(--surface); border: 1px solid var(--red);
    border-radius: var(--radius); padding: 24px; text-align: center;
    margin-bottom: 20px; color: var(--red);
  }
  .error-card .btn-retry {
    margin-top: 12px; font-family: var(--font-body); font-size: 13px; font-weight: 500;
    padding: 8px 20px; border-radius: 999px;
    background: transparent; color: var(--text); border: 1px solid var(--border);
    cursor: pointer; transition: .15s;
  }
  .error-card .btn-retry:hover { background: var(--surface-hover); }

  /* Footer */
  .footer { text-align: center; padding-top: 32px; border-top: 1px solid var(--border); }
  .footer a {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 500; color: var(--text-secondary);
    text-decoration: none; transition: .15s;
  }
  .footer a:hover { color: var(--text); }
  .footer a svg { width: 16px; height: 16px; }

  @media (max-width: 480px) {
    .container { padding: 40px 16px 64px; }
    .header h1 { font-size: 22px; }
    .download-card { padding: 24px 20px; }
    .features { grid-template-columns: 1fr; }
    .sha-value { max-width: 200px; }
  }
  @media (prefers-reduced-motion) {
    .btn-download { transition: none; }
    .skeleton { animation: none; }
  }
</style>
</head>
<body>

<div class="container">

  <header class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
    </div>
    <h1>GeoFlux</h1>
    <p class="sub">基站数据地理化匹配工具</p>
  </header>

  <!-- Download card — populated by JS -->
  <div id="download-section"></div>

  <!-- Features -->
  <div class="features">
    <div class="feature">
      <div class="feature-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
      </div>
      <div>
        <h3>Excel 一键导入</h3>
        <p>上传基站表格，自动解析列名并匹配地理坐标</p>
      </div>
    </div>
    <div class="feature">
      <div class="feature-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
      </div>
      <div>
        <h3>多 Sheet 支持</h3>
        <p>自动识别或手动指定要处理的 Sheet，支持模糊匹配</p>
      </div>
    </div>
    <div class="feature">
      <div class="feature-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      <div>
        <h3>合并分组去重</h3>
        <p>数据合并、分组统计、智能去重，处理大量基站数据</p>
      </div>
    </div>
    <div class="feature">
      <div class="feature-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>
      </div>
      <div>
        <h3>OCR 模糊识别</h3>
        <p>照片文字识别自动匹配，内置纠错和相似度评分</p>
      </div>
    </div>
  </div>

  <!-- Version history -->
  <div class="history" id="history-section">
    <div class="history-header" id="history-toggle" role="button" tabindex="0" aria-expanded="false">
      <h2>历史版本</h2>
      <svg class="chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="history-list" id="history-list"></div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <a href="https://github.com/chainlinn/GeoFlux" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
      GitHub
    </a>
  </footer>

</div>

<script>
(async function() {
  const RELEASES_JSON = '/releases.json';

  const $download = document.getElementById('download-section');
  const $historyList = document.getElementById('history-list');
  const $historyToggle = document.getElementById('history-toggle');

  function renderSkeleton() {
    $download.innerHTML = `<div class="skeleton">
      <div class="skeleton-line" style="width:80px;height:20px;border-radius:999px;margin-bottom:16px"></div>
      <div class="skeleton-line" style="width:280px"></div>
      <div class="skeleton-line" style="width:160px;margin-bottom:20px"></div>
      <div class="skeleton-line" style="width:200px;height:44px;border-radius:999px"></div>
      <div class="skeleton-line" style="width:300px;margin-top:16px"></div>
    </div>`;
  }

  function renderError(msg) {
    $download.innerHTML = `<div class="error-card">
      <p>${escapeHtml(msg)}</p>
      <button class="btn-retry" onclick="location.reload()">重试</button>
    </div>`;
  }

  function render(data) {
    if (!Array.isArray(data) || data.length === 0) {
      $download.innerHTML = `<div class="download-card"><p style="color:var(--text-muted)">暂无发布版本</p></div>`;
      return;
    }

    const releases = data.sort((a, b) => b.version.localeCompare(a.version, undefined, { numeric: true }));
    const latest = releases[0];

    // ── Primary download card ──
    $download.innerHTML = `<div class="download-card">
      <div class="version">v${escapeHtml(latest.version)}</div>
      <div class="filename">${escapeHtml(latest.file)}</div>
      <div class="meta"><span>${escapeHtml(latest.size || '')}</span><span>${escapeHtml(latest.date || '')}</span></div>
      <a class="btn-download" href="${escapeAttr(latest.url)}" download>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
        下载 Windows 安装包
      </a>
      ${latest.sha256 ? `<div class="sha-row"><span class="sha-label">SHA256</span><code class="sha-value" id="sha-val">${escapeHtml(latest.sha256)}</code><button class="btn-copy" id="btn-copy">复制</button></div>` : ''}
    </div>`;

    // SHA256 copy
    const btnCopy = document.getElementById('btn-copy');
    const shaVal = document.getElementById('sha-val');
    if (btnCopy && shaVal) {
      btnCopy.addEventListener('click', () => {
        navigator.clipboard.writeText(shaVal.textContent).then(() => {
          btnCopy.textContent = '已复制';
          btnCopy.classList.add('copied');
          setTimeout(() => { btnCopy.textContent = '复制'; btnCopy.classList.remove('copied'); }, 2000);
        }).catch(() => {});
      });
    }

    // ── History list ──
    if (releases.length <= 1) {
      document.getElementById('history-section').style.display = 'none';
    } else {
      $historyList.innerHTML = releases.slice(1).map(r => `<div class="history-item">
        <div>
          <span class="ver">v${escapeHtml(r.version)}</span>
          <span class="info"> &middot; ${escapeHtml(r.size || '')} &middot; ${escapeHtml(r.date || '')}</span>
        </div>
        <a class="btn-sm" href="${escapeAttr(r.url)}" download>下载</a>
      </div>`).join('');
    }
  }

  function escapeAttr(s) {
    if (!s) return '';
    return String(s).replace(/"/g, '&quot;');
  }

  function escapeHtml(s) {
    if (!s) return '';
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
    return String(s).replace(/[&<>"']/g, c => map[c]);
  }

  // ── History toggle ──
  $historyToggle.addEventListener('click', () => {
    const expanded = $historyToggle.getAttribute('aria-expanded') === 'true';
    $historyToggle.setAttribute('aria-expanded', String(!expanded));
    $historyToggle.classList.toggle('open', !expanded);
    $historyList.classList.toggle('open', !expanded);
  });
  $historyToggle.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); $historyToggle.click(); }
  });

  // ── Fetch releases.json ──
  renderSkeleton();
  try {
    const res = await fetch(RELEASES_JSON);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    render(data);
  } catch (err) {
    renderError('无法加载版本信息，请检查网络后重试');
    console.error('Failed to fetch releases:', err);
  }
})();
</script>

</body>
</html>
